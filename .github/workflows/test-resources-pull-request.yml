name: release ci-checks

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/jobs_ci-checks.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  create-tag:
    name: Create Tag
    runs-on: ubuntu-24.04
    env:
      SAM_CLI_TELEMETRY: 0
    defaults:
      run:
        shell: bash
        working-directory: .github/workflows
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          submodules: true

      - name: Get Current Version
        id: get-current-version
        run: |
          yq .description job_ci-checks.yml
          current_version=$( yq .description job_ci-checks.yml )
          echo "CURRENT_VERSION=$current_version" >> $GITHUB_OUTPUT

      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Get Name
        id: get-name
        run: |
          job_name=$( yq .name job_ci-checks.yml ) 
          echo "JOB_NAME=$job_name" >> $GITHUB_OUTPUT

      - name: Get Version
        id: get-version
        run: |
          job_version=$( yq .description job_ci-checks.yml ) 
          echo "JOB_VERSION=$job_version" >> $GITHUB_OUTPUT

      - name: Check for Version Update
        run: |
          echo ${{ steps.get-current-version.outputs.CURRENT_VERSION }}
          echo ${{ steps.get-version.outputs.JOB_VERSION }}

      - name: Create and Push Tag
        run: |
          job_name=${{ steps.get-name.outputs.JOB_NAME }}
          job_version=${{ steps.get-version.outputs.JOB_VERSION }}
          
          git tag $job_name/$job_version
          git push origin $job_name/$job_version
