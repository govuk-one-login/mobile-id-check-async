AWSTemplateFormatVersion: "2010-09-09"

Resources:
  CredentialResultsTable:
    Type: AWS::DynamoDB::Table
    Metadata:
      checkov:
        skip:
          - id: "CKV_AWS_28"
            comment: "Backups not required for test tables."
          - id: "CKV_AWS_119"
            comment: "Encryption not required for test tables."
    Properties:
      TableName: !Sub ${AWS::StackName}-credential-results-${Environment}
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      TimeToLiveSpecification:
        AttributeName: timeToLiveInSeconds
        Enabled: true
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
